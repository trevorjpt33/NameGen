apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen-api
  namespace: namegen
  labels:
    app: namegen-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: namegen-api
  template:
    metadata:
      labels:
        app: namegen-api
    spec:
      containers:
        - name: namegen-api
          image: docker.io/library/namegen-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: namegen-config
          env:
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: namegen-secret
                  key: DB_CONNECTION_STRING
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"